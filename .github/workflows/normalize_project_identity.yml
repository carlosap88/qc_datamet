name: Normalize project identity

on:
  push:
    paths:
      - ".github/workflows/normalize_project_identity.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize name and version
        shell: python
        run: |
          from pathlib import Path

          files = [
              Path("README.md"),
              Path("pyproject.toml"),
              Path("docs/architecture.md"),
              Path("config/settings.yaml"),
              Path("config/pipeline.yaml"),
              Path("config/excel_schema.yaml"),
              Path("config/data_dictionary.yaml"),
              Path("config/canonical_schema.yaml"),
              Path("config/stations.yaml"),
              Path("config/variables.yaml"),
              Path("config/units.yaml"),
          ]

          for path in files:
              text = path.read_text(encoding="utf-8")

              # Nombre visible del proyecto. Los identificadores técnicos
              # en minúsculas, como qc_datamet, no se modifican.
              text = text.replace("QC_DATAMET", "QC_DataMet")
              text = text.replace("METEO_QC", "QC_DataMet")

              # Versión oficial actual.
              text = text.replace('version = "1.0.0"', 'version = "0.1.0"')
              text = text.replace('version: "1.0.0"', 'version: "0.1.0"')
              text = text.replace("version: 1.0.0", "version: 0.1.0")
              text = text.replace("QC_DataMet v1.0", "QC_DataMet v0.1.0")

              # Mostrar nombre y versión en las cabeceras principales.
              if path == Path("README.md"):
                  if text.startswith("# QC_DataMet\n"):
                      text = text.replace(
                          "# QC_DataMet\n",
                          "# QC_DataMet v0.1.0\n",
                          1,
                      )
              elif path == Path("docs/architecture.md"):
                  if text.startswith("# QC_DataMet\n"):
                      text = text.replace(
                          "# QC_DataMet\n",
                          "# QC_DataMet v0.1.0\n",
                          1,
                      )

              path.write_text(text, encoding="utf-8", newline="\n")

      - name: Commit normalized identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md pyproject.toml docs/architecture.md config/*.yaml
          if git diff --cached --quiet; then
            echo "No identity changes were required."
          else
            git commit -m "chore: normalize project name and version [skip ci]"
            git push
          fi
