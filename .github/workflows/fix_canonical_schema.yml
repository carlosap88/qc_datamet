name: Fix canonical schema indentation

on:
  push:
    paths:
      - ".github/workflows/fix_canonical_schema.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install YAML dependency
        run: python -m pip install PyYAML

      - name: Fix indentation and validate YAML
        shell: python
        run: |
          from pathlib import Path
          import yaml

          path = Path("config/canonical_schema.yaml")
          text = path.read_text(encoding="utf-8")

          old = '''        - position: 21
    name: "minimum_temperature_c"
'''
          new = '''  - position: 21
    name: "minimum_temperature_c"
'''

          if old not in text:
              raise SystemExit("No se encontró el bloque esperado para corregir.")

          text = text.replace(old, new, 1)
          path.write_text(text, encoding="utf-8", newline="\n")

          with path.open("r", encoding="utf-8") as stream:
              yaml.safe_load(stream)

          print("canonical_schema.yaml corregido y validado.")

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/canonical_schema.yaml
          git commit -m "fix(config): correct canonical schema indentation [skip ci]"
          git push
