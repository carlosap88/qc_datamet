name: Fix canonical schema indentation

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install YAML dependency
        run: python -m pip install PyYAML

      - name: Fix indentation and validate YAML
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          path = Path("config/canonical_schema.yaml")
          text = path.read_text(encoding="utf-8")

          old = '''        - position: 21
              name: "minimum_temperature_c"
          '''
          new = '''  - position: 21
              name: "minimum_temperature_c"
          '''

          if old in text:
              text = text.replace(old, new, 1)
              path.write_text(text, encoding="utf-8", newline="\n")

          with path.open("r", encoding="utf-8") as stream:
              yaml.safe_load(stream)

          print("canonical_schema.yaml válido.")
          PY

      - name: Commit fix when required
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/canonical_schema.yaml
          if git diff --cached --quiet; then
            echo "No changes required."
          else
            git commit -m "fix(config): correct canonical schema indentation [skip ci]"
            git push
          fi
