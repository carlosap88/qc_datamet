cloud_base_2_ft:
  description: Second cloud layer base height
  description_es: Altura de la base — segunda capa de nubes
  unit: feet
  type: float32
  valid_min: 0
  aliases:
    - 2° Altura de la base de la nube (pies)

cloud_type_2:
  description: Second cloud layer type
