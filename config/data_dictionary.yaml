# =============================================================================
# QC_DATAMET v1.0
# data_dictionary.yaml
#
# Diccionario semántico de datos meteorológicos aeronáuticos.
#
# Responsabilidades:
#   - mapear encabezados originales a nombres estandarizados;
#   - documentar el significado de cada variable;
#   - definir tipos de datos y unidades;
#   - identificar categorías y grupos de variables;
#   - servir como referencia para el pipeline, reportes y exportaciones.
#
# Las reglas y límites de control de calidad deben definirse en:
#   config/qc_rules.yaml
# =============================================================================

dictionary:
  name: "qc_datamet_data_dictionary"
  version: "1.0.0"
  project: "QC_DATAMET"
  language: "es"
  description: >
    Diccionario semántico de las variables utilizadas por QC_DATAMET para
    procesar, normalizar, validar y documentar observaciones meteorológicas
    aeronáuticas.

  source_schema: "excel_schema.yaml"

  conventions:
    standard_names: "snake_case"
    text_dtype: "string"
    nullable_integer_dtype: "Int64"
    nullable_float_dtype: "Float64"
    datetime_timezone: "UTC"
    indentation_spaces: 2
    encoding: "UTF-8"

fields:

  # ===========================================================================
  # 1. IDENTIFICACIÓN DE LA ESTACIÓN
  # ===========================================================================

  - id: 1
    source_name: "Identificador OACI o Cod FAP"
    standard_name: "station_id"
    short_name: "station_id"

    description_es: >
      Identificador OACI o código institucional FAP correspondiente a la
      estación meteorológica o aeródromo.
    description_en: >
      ICAO identifier or institutional FAP code corresponding to the
      meteorological station or aerodrome.

    category: "station"
    variable_group: "station_identification"

    source_dtype: "string"
    target_dtype: "string"

    source_unit: null
    target_unit: null

    nullable: false
    datetime_component: false

    descriptor: null
    omm_code: null
    oaci_code: "ICAO_LOCATION_INDICATOR"

    example: "SPIM"

    used_in:
      - "METAR"
      - "SPECI"
      - "climatology"
      - "quality_control"

    notes: >
      Debe normalizarse en mayúsculas y eliminar espacios al inicio y al final.

  # ===========================================================================
  # 2. ESTADO DEL PRODUCTO
  # ===========================================================================

  - id: 2
    source_name: >
      Estado del producto de aviación (rutinario, especial, corregido,
      no disponible)
    standard_name: "report_status"
    short_name: "status"

    description_es: >
      Estado operacional del producto meteorológico de aviación.
    description_en: >
      Operational status of the aviation meteorological report.

    category: "report"
    variable_group: "report_metadata"

    source_dtype: "string"
    target_dtype: "string"

    source_unit: null
    target_unit: null

    nullable: false
    datetime_component: false

    descriptor: "report_types"
    omm_code: null
    oaci_code: null

    example: "rutinario"

    used_in:
      - "METAR"
      - "SPECI"
      - "quality_control"
      - "reports"

    notes: >
      Los valores permitidos deben ser administrados mediante el descriptor
      report_types.yaml.

  # ===========================================================================
  # 3. AÑO
  # ===========================================================================

  - id: 3
    source_name: "Año"
    standard_name: "year"
    short_name: "year"

    description_es: >
      Año UTC correspondiente a la observación meteorológica.
    description_en: >
      UTC year corresponding to the meteorological observation.

    category: "datetime"
    variable_group: "datetime_components"

    source_dtype: "integer"
    target_dtype: "Int16"

    source_unit: "year"
    target_unit: "year"

    nullable: false
    datetime_component: true

    descriptor: null
    omm_code: null
    oaci_code: null

    example: 2026

    used_in:
      - "datetime_utc"
      - "quality_control"
      - "climatology"
      - "reports"

    notes: >
      Se utiliza junto con mes, día, hora y minuto para construir datetime_utc.

  # ===========================================================================
  # 4. MES
  # ===========================================================================

  - id: 4
    source_name: "Mes"
    standard_name: "month"
    short_name: "month"

    description_es: >
      Mes UTC correspondiente a la observación meteorológica.
    description_en: >
      UTC month corresponding to the meteorological observation.

    category: "datetime"
    variable_group: "datetime_components"

    source_dtype: "integer"
    target_dtype: "Int8"

    source_unit: "month"
    target_unit: "month"

    nullable: false
    datetime_component: true

    descriptor: null
    omm_code: null
    oaci_code: null

    example: 7

    used_in:
      - "datetime_utc"
      - "quality_control"
      - "climatology"
      - "reports"

    notes: >
      Los valores válidos deben estar comprendidos entre 1 y 12.

  # ===========================================================================
  # 5. DÍA
  # ===========================================================================

  - id: 5
    source_name: "Dia"
    standard_name: "day"
    short_name: "day"

    description_es: >
      Día UTC correspondiente a la observación meteorológica.
    description_en: >
      UTC day corresponding to the meteorological observation.

    category: "datetime"
    variable_group: "datetime_components"

    source_dtype: "integer"
    target_dtype: "Int8"

    source_unit: "day"
    target_unit: "day"

    nullable: false
    datetime_component: true

    descriptor: null
    omm_code: null
    oaci_code: null

    example: 13

    used_in:
      - "datetime_utc"
      - "quality_control"
      - "climatology"
      - "reports"

    notes: >
      La validación debe considerar la cantidad real de días de cada mes
      y los años bisiestos.

  # ===========================================================================
  # 6. HORA UTC
  # ===========================================================================

  - id: 6
    source_name: "Hora (UTC)"
    standard_name: "hour_utc"
    short_name: "hour"

    description_es: >
      Hora UTC correspondiente a la observación meteorológica.
    description_en: >
      UTC hour corresponding to the meteorological observation.

    category: "datetime"
    variable_group: "datetime_components"

    source_dtype: "integer"
    target_dtype: "Int8"

    source_unit: "hour"
    target_unit: "hour"

    nullable: false
    datetime_component: true

    descriptor: null
    omm_code: null
    oaci_code: null

    example: 18

    used_in:
      - "datetime_utc"
      - "quality_control"
      - "METAR"
      - "SPECI"

    notes: >
      Los valores válidos deben estar comprendidos entre 0 y 23.

  # ===========================================================================
  # 7. MINUTO
  # ===========================================================================

  - id: 7
    source_name: "Minuto"
    standard_name: "minute"
    short_name: "minute"

    description_es: >
      Minuto UTC correspondiente a la observación meteorológica.
    description_en: >
      UTC minute corresponding to the meteorological observation.

    category: "datetime"
    variable_group: "datetime_components"

    source_dtype: "integer"
    target_dtype: "Int8"

    source_unit: "minute"
    target_unit: "minute"

    nullable: false
    datetime_component: true

    descriptor: null
    omm_code: null
    oaci_code: null

    example: 0

    used_in:
      - "datetime_utc"
      - "quality_control"
      - "METAR"
      - "SPECI"

    notes: >
      Los valores válidos deben estar comprendidos entre 0 y 59.

  # ===========================================================================
  # 8. DIRECCIÓN DEL VIENTO
  # ===========================================================================

  - id: 8
    source_name: "Dirección del viento"
    standard_name: "wind_direction_deg"
    short_name: "wind_dir"

    description_es: >
      Dirección media desde la cual sopla el viento durante el periodo
      de observación.
    description_en: >
      Mean direction from which the wind is blowing during the observation
      period.

    category: "wind"
    variable_group: "wind_direction"

    source_dtype: "numeric"
    target_dtype: "Float32"

    source_unit: "degree"
    target_unit: "degree"

    nullable: true
    datetime_component: false

    descriptor: "wind_codes"
    omm_code: null
    oaci_code: "ddd"

    example: 180

    used_in:
      - "METAR"
      - "SPECI"
      - "quality_control"
      - "climatology"

    notes: >
      Se expresa en grados verdaderos. Los valores especiales como viento
      variable o calma deben normalizarse mediante el descriptor correspondiente.

  # ===========================================================================
  # 9. DIRECCIÓN EXTREMA ANTIHORARIA
  # ===========================================================================

  - id: 9
    source_name: "Dirección extrema antihoraria del viento"
    standard_name: "wind_direction_ccw_deg"
    short_name: "wind_dir_ccw"

    description_es: >
      Límite extremo antihorario de la variación observada en la dirección
      del viento.
    description_en: >
      Counterclockwise extreme limit of the observed wind-direction variation.

    category: "wind"
    variable_group: "wind_direction_variation"

    source_dtype: "numeric"
    target_dtype: "Float32"

    source_unit: "degree"
    target_unit: "degree"

    nullable: true
    datetime_component: false

    descriptor: null
    omm_code: null
    oaci_code: null

    example: 140

    used_in:
      - "METAR"
      - "SPECI"
      - "quality_control"

    notes: >
      Debe interpretarse junto con wind_direction_cw_deg.

  # ===========================================================================
  # 10. DIRECCIÓN EXTREMA HORARIA
  # ===========================================================================

  - id: 10
    source_name: "Dirección extrema horaria del viento"
    standard_name: "wind_direction_cw_deg"
    short_name: "wind_dir_cw"

    description_es: >
      Límite extremo horario de la variación observada en la dirección
      del viento.
    description_en: >
      Clockwise extreme limit of the observed wind-direction variation.

    category: "wind"
    variable_group: "wind_direction_variation"

    source_dtype: "numeric"
    target_dtype: "Float32"

    source_unit: "degree"
    target_unit: "degree"

    nullable: true
    datetime_component: false

    descriptor: null
    omm_code: null
    oaci_code: null

    example: 220

    used_in:
      - "METAR"
      - "SPECI"
      - "quality_control"

    notes: >
      Debe interpretarse junto con wind_direction_ccw_deg.

  # ===========================================================================
  # 11. VELOCIDAD DEL VIENTO
  # ===========================================================================

  - id: 11
    source_name: "Velocidad del viento (nudos)"
    standard_name: "wind_speed_kt"
    short_name: "wind_speed"

    description_es: >
      Velocidad media del viento expresada en nudos.
    description_en: >
      Mean wind speed expressed in knots.

    category: "wind"
    variable_group: "wind_speed"

    source_dtype: "numeric"
    target_dtype: "Float32"

    source_unit: "knot"
    target_unit: "knot"

    nullable: true
    datetime_component: false

    descriptor: null
    omm_code: null
    oaci_code: "ff"

    example: 12

    used_in:
      - "METAR"
      - "SPECI"
      - "TAF"
      - "quality_control"
      - "climatology"

    notes: >
      Los valores negativos no son válidos.

  # ===========================================================================
  # 12. RÁFAGA DEL VIENTO
  # ===========================================================================

  - id: 12
    source_name: "Velocidad del viento. Rafagas (nudos)"
    standard_name: "wind_gust_kt"
    short_name: "wind_gust"

    description_es: >
      Velocidad máxima de la ráfaga observada durante el periodo de medición.
    description_en: >
      Maximum gust speed observed during the measurement period.

    category: "wind"
    variable_group: "wind_speed"

    source_dtype: "numeric"
    target_dtype: "Float32"

    source_unit: "knot"
    target_unit: "knot"

    nullable: true
    datetime_component: false

    descriptor: null
    omm_code: null
    oaci_code: "Gff"

    example: 22

    used_in:
      - "METAR"
      - "SPECI"
      - "TAF"
      - "quality_control"

    notes: >
      Cuando exista, normalmente debe ser mayor que la velocidad media
      del viento.

  # ===========================================================================
  # 13. TEMPERATURA DEL AIRE
  # ===========================================================================

  - id: 13
    source_name: "Temperatura del aire"
    standard_name: "air_temperature_c"
    short_name: "air_temp"

    description_es: >
      Temperatura del aire observada en la estación meteorológica.
    description_en: >
      Air temperature observed at the meteorological station.

    category: "temperature"
    variable_group: "air_temperature"

    source_dtype: "numeric"
    target_dtype: "Float32"

    source_unit: "celsius"
    target_unit: "celsius"

    nullable: true
    datetime_component: false

    descriptor: null
    omm_code: null
    oaci_code: "T"

    example: 24.5

    used_in:
      - "METAR"
      - "SPECI"
      - "quality_control"
      - "climatology"
      - "reports"

    notes: >
      Los límites físicos y climatológicos deben definirse en qc_rules.yaml

        # ===========================================================================
  # 14. TEMPERATURA DE BULBO HÚMEDO
  # ===========================================================================

  - id: 14
    source_name: "Temperatura Bulbo humedo"
    standard_name: "wet_bulb_temperature_c"
    short_name: "wet_bulb_temp"

    description_es: >
      Temperatura de bulbo húmedo observada en la estación meteorológica.
    description_en: >
      Wet-bulb temperature observed at the meteorological station.

    category: "temperature"
    variable_group: "air_temperature"

    source_dtype: "numeric"
    target_dtype: "Float32"

    source_unit: "celsius"
    target_unit: "celsius"

    nullable: true
    datetime_component: false

    descriptor: null
    omm_code: null
    oaci_code: null

    example: 21.3

    used_in:
      - "quality_control"
      - "climatology"
      - "reports"

    notes: >
      La temperatura de bulbo húmedo normalmente no debe ser mayor que la
      temperatura del aire. Los límites y relaciones deben definirse en
      qc_rules.yaml.

  # ===========================================================================
  # 15. TEMPERATURA DEL PUNTO DE ROCÍO
  # ===========================================================================

  - id: 15
    source_name: "Temperatura de rocio"
    standard_name: "dew_point_temperature_c"
    short_name: "dew_point"

    description_es: >
      Temperatura del punto de rocío calculada u observada en la estación.
    description_en: >
      Dew-point temperature calculated or observed at the station.

    category: "temperature"
    variable_group: "air_temperature"

    source_dtype: "numeric"
    target_dtype: "Float32"

    source_unit: "celsius"
    target_unit: "celsius"

    nullable: true
    datetime_component: false

    descriptor: null
    omm_code: null
    oaci_code: "Td"

    example: 18.7

    used_in:
      - "METAR"
      - "SPECI"
      - "quality_control"
      - "climatology"
      - "reports"

    notes: >
      Normalmente no debe ser mayor que la temperatura del aire. Las reglas
      de consistencia deben definirse en qc_rules.yaml.

  # ===========================================================================
  # 16. PRESIÓN QNH
  # ===========================================================================

  - id: 16
    source_name: "Presion a nivel medio del mar (QNH)"
    standard_name: "qnh_hpa"
    short_name: "qnh"

    description_es: >
      Presión atmosférica reducida al nivel medio del mar y utilizada como
      reglaje altimétrico QNH.
    description_en: >
      Atmospheric pressure reduced to mean sea level and used as the QNH
      altimeter setting.

    category: "pressure"
    variable_group: "atmospheric_pressure"

    source_dtype: "numeric"
    target_dtype: "Float32"

    source_unit: "hPa"
    target_unit: "hPa"

    nullable: true
    datetime_component: false

    descriptor: null
    omm_code: null
    oaci_code: "QNH"

    example: 1013.2

    used_in:
      - "METAR"
      - "SPECI"
      - "quality_control"
      - "climatology"
      - "reports"

    notes: >
      Los límites físicos y climatológicos deben definirse por estación en
      qc_rules.yaml o stations.yaml.

  # ===========================================================================
  # 17. PRESIÓN QFE
  # ===========================================================================

  - id: 17
    source_name: "Presion a nivel de la estacion (QFE)"
    standard_name: "qfe_hpa"
    short_name: "qfe"

    description_es: >
      Presión atmosférica observada o reducida al nivel de referencia de la
      estación o aeródromo.
    description_en: >
      Atmospheric pressure observed or reduced to the station or aerodrome
      reference level.

    category: "pressure"
    variable_group: "atmospheric_pressure"

    source_dtype: "numeric"
    target_dtype: "Float32"

    source_unit: "hPa"
    target_unit: "hPa"

    nullable: true
    datetime_component: false

    descriptor: null
    omm_code: null
    oaci_code: "QFE"

    example: 1004.8

    used_in:
      - "quality_control"
      - "climatology"
      - "reports"

    notes: >
      Su relación con QNH depende de la elevación de la estación. Las reglas de
      consistencia deben definirse en qc_rules.yaml.

  # ===========================================================================
  # 18. VISIBILIDAD REINANTE
  # ===========================================================================

  - id: 18
    source_name: "Visibilidad reinante"
    standard_name: "prevailing_visibility_m"
    short_name: "visibility"

    description_es: >
      Visibilidad horizontal reinante representativa del aeródromo o estación.
    description_en: >
      Prevailing horizontal visibility representative of the aerodrome or
      station.

    category: "visibility"
    variable_group: "horizontal_visibility"

    source_dtype: "numeric"
    target_dtype: "Float32"

    source_unit: "meter"
    target_unit: "meter"

    nullable: true
    datetime_component: false

    descriptor: "visibility_codes"
    omm_code: null
    oaci_code: "VVVV"

    example: 10000

    used_in:
      - "METAR"
      - "SPECI"
      - "TAF"
      - "quality_control"
      - "climatology"
      - "reports"

    notes: >
      Los valores especiales o codificados deben normalizarse mediante
      visibility_codes.yaml.

  # ===========================================================================
  # 19. PRIMERA VISIBILIDAD MÍNIMA
  # ===========================================================================

  - id: 19
    source_name: "1° Visibilidad minima horizontal"
    standard_name: "minimum_visibility_1_m"
    short_name: "min_visibility_1"

    description_es: >
      Primera visibilidad horizontal mínima observada cuando difiere de la
      visibilidad reinante.
    description_en: >
      First minimum horizontal visibility observed when it differs from the
      prevailing visibility.

    category: "visibility"
    variable_group: "minimum_visibility"

    source_dtype: "numeric"
    target_dtype: "Float32"

    source_unit: "meter"
    target_unit: "meter"

    nullable: true
    datetime_component: false

    descriptor: "visibility_codes"
    omm_code: null
    oaci_code: null

    example: 3000

    used_in:
      - "METAR"
      - "SPECI"
      - "quality_control"
      - "climatology"

    notes: >
      Debe interpretarse conjuntamente con minimum_visibility_direction_1.

  # ===========================================================================
  # 20. DIRECCIÓN DE LA PRIMERA VISIBILIDAD MÍNIMA
  # ===========================================================================

  - id: 20
    source_name: "1° Direccion de la visibilidad horizontal minima observada"
    standard_name: "minimum_visibility_direction_1"
    short_name: "min_visibility_dir_1"

    description_es: >
      Dirección correspondiente a la primera visibilidad horizontal mínima
      observada.
    description_en: >
      Direction corresponding to the first observed minimum horizontal
      visibility.

    category: "visibility"
    variable_group: "minimum_visibility"

    source_dtype: "string"
    target_dtype: "string"

    source_unit: null
    target_unit: null

    nullable: true
    datetime_component: false

    descriptor: "visibility_codes"
    omm_code: null
    oaci_code: null

    example: "NE"

    used_in:
      - "METAR"
      - "SPECI"
      - "quality_control"

    notes: >
      Los valores deben normalizarse a los sectores de dirección definidos en
      visibility_codes.yaml.

  # ===========================================================================
  # 21. SEGUNDA VISIBILIDAD MÍNIMA
  # ===========================================================================

  - id: 21
    source_name: "2° Visibilidad minima horizontal"
    standard_name: "minimum_visibility_2_m"
    short_name: "min_visibility_2"

    description_es: >
      Segunda visibilidad horizontal mínima observada cuando se registra una
      segunda dirección significativa.
    description_en: >
      Second minimum horizontal visibility observed when a second significant
      direction is reported.

    category: "visibility"
    variable_group: "minimum_visibility"

    source_dtype: "numeric"
    target_dtype: "Float32"

    source_unit: "meter"
    target_unit: "meter"

    nullable: true
    datetime_component: false

    descriptor: "visibility_codes"
    omm_code: null
    oaci_code: null

    example: 5000

    used_in:
      - "METAR"
      - "SPECI"
      - "quality_control"
      - "climatology"

    notes: >
      Debe interpretarse conjuntamente con minimum_visibility_direction_2.

  # ===========================================================================
  # 22. DIRECCIÓN DE LA SEGUNDA VISIBILIDAD MÍNIMA
  # ===========================================================================

  - id: 22
    source_name: "2° Direccion de la visibilidad horizontal minima observada"
    standard_name: "minimum_visibility_direction_2"
    short_name: "min_visibility_dir_2"

    description_es: >
      Dirección correspondiente a la segunda visibilidad horizontal mínima
      observada.
    description_en: >
      Direction corresponding to the second observed minimum horizontal
      visibility.

    category: "visibility"
    variable_group: "minimum_visibility"

    source_dtype: "string"
    target_dtype: "string"

    source_unit: null
    target_unit: null

    nullable: true
    datetime_component: false

    descriptor: "visibility_codes"
    omm_code: null
    oaci_code: null

    example: "SW"

    used_in:
      - "METAR"
      - "SPECI"
      - "quality_control"

    notes: >
      Los valores deben normalizarse a los sectores de dirección definidos en
      visibility_codes.yaml.

  # ===========================================================================
  # 23. PRIMER TIEMPO PRESENTE SIGNIFICATIVO
  # ===========================================================================

  - id: 23
    source_name: "1 Tiempo presente significativo"
    standard_name: "present_weather_1"
    short_name: "weather_1"

    description_es: >
      Primer fenómeno de tiempo presente significativo observado en la
      estación o sus inmediaciones.
    description_en: >
      First significant present-weather phenomenon observed at the station or
      in its vicinity.

    category: "weather"
    variable_group: "present_weather"

    source_dtype: "string"
    target_dtype: "string"

    source_unit: null
    target_unit: null

    nullable: true
    datetime_component: false

    descriptor: "weather_codes"
    omm_code: null
    oaci_code: "w'w'"

    example: "RA"

    used_in:
      - "METAR"
      - "SPECI"
      - "TAF"
      - "quality_control"
      - "climatology"
      - "reports"

    notes: >
      Debe conservar la codificación meteorológica aeronáutica estandarizada y
      validarse mediante weather_codes.yaml.

  # ===========================================================================
  # 24. SEGUNDO TIEMPO PRESENTE SIGNIFICATIVO
  # ===========================================================================

  - id: 24
    source_name: "2 Tiempo presente significativo"
    standard_name: "present_weather_2"
    short_name: "weather_2"

    description_es: >
      Segundo fenómeno de tiempo presente significativo observado.
    description_en: >
      Second significant present-weather phenomenon observed.

    category: "weather"
    variable_group: "present_weather"

    source_dtype: "string"
    target_dtype: "string"

    source_unit: null
    target_unit: null

    nullable: true
    datetime_component: false

    descriptor: "weather_codes"
    omm_code: null
    oaci_code: "w'w'"

    example: "BR"

    used_in:
      - "METAR"
      - "SPECI"
