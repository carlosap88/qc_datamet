# -----------------------------------------------------------------------------
# PRECIPITACIÓN Y HUMEDAD / PRECIPITATION & HUMIDITY
# -----------------------------------------------------------------------------

precipitation_mm:
  description: Accumulated precipitation
  description_es: Precipitación acumulada
  unit: millimeter
  type: float32
  valid_min: 0
  aliases:
    - Precipitacion Acumulada

relative_humidity:
  description: Relative humidity
  description_es: Humedad relativa
  unit: percent
  type: float32
  valid_min: 0
  valid_max: 100
  aliases:
    - Humedad relativa (%)

