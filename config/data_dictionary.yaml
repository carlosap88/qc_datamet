metar:
  description: Raw METAR aeronautical meteorological report (full text string)
  description_es: Reporte meteorológico aeronáutico de rutina (texto completo)
  unit: null
  type: string
  example: "SPIM 151200Z 18005KT 9999 FEW020 25/18 Q1013"
  aliases:
    - METAR
    - Reporte METAR

remarks:
  description: Additional remarks
  description_es: Observaciones adicionales
  unit: null
  type: string
  aliases:
    - Remarks

source_file:
  description: Original source filename
  description_es: Nombre del archivo fuente original
  unit: null
  type: string
