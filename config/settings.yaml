# =============================================================================
# QC_DataMet v0.1.0
# settings.yaml
#
# Configuración global del sistema.
# Este archivo contiene únicamente parámetros generales de la plataforma.
# =============================================================================

# =============================================================================
# PROYECTO
# =============================================================================

project:

  name: "QC_DataMet"

  version: "0.1.0"

  description: >
    Plataforma profesional para el Control de Calidad de
    Observaciones Meteorológicas Aeronáuticas.

  organization: "Dirección de Meteorología Aeronáutica y Espacial"

  institution: "Fuerza Aérea del Perú"

  author: "TC3 FAP Roberto Carlos Arqqui Poma"

  license: "MIT"

# =============================================================================
# SISTEMA
# =============================================================================

system:

  language: "es"

  timezone: "UTC"

  encoding: "utf-8"

  locale: "es_PE"

  datetime_format: "%Y-%m-%d %H:%M:%S"

  date_format: "%Y-%m-%d"

# =============================================================================
# ESTRUCTURA DEL PROYECTO
# =============================================================================

paths:

  assets: "./assets"

  config: "./config"

  data: "./data"

  docs: "./docs"

  logs: "./logs"

  reports: "./reports"

  src: "./src"

  tests: "./tests"

# =============================================================================
# DATOS
# =============================================================================

data:

  raw:

    excel: "./data/raw/excel"

    csv: "./data/raw/csv"

    metar: "./data/raw/metar"

    bufr: "./data/raw/bufr"

  staging: "./data/staging"

  processed: "./data/processed"

  consolidated: "./data/consolidated"

  final: "./data/final"

  quarantine:

    files: "./data/quarantine/files"

    records: "./data/quarantine/records"

  parquet:

    root: "./data/parquet"

    cache: "./data/parquet/cache"

    daily: "./data/parquet/daily"

    monthly: "./data/parquet/monthly"

    yearly: "./data/parquet/yearly"

# =============================================================================
# FORMATOS DE ENTRADA
# =============================================================================

input:

  excel:

    enabled: true

    extensions:

      - ".xlsx"
      - ".xls"
      - ".xlsm"
      - ".xlsb"

  csv:

    enabled: true

    extensions:

      - ".csv"

  metar:

    enabled: true

    extensions:

      - ".txt"

  bufr:

    enabled: false

    extensions:

      - ".bufr"

# =============================================================================
# LOGGING
# =============================================================================

logging:

  enabled: true

  level: "INFO"

  console: true

  file: true

  directory: "./logs"

  filename: "qc_datamet.log"

  rotation: "daily"

  retention_days: 30

# =============================================================================
# EJECUCIÓN
# =============================================================================

execution:

  stop_on_error: true

  overwrite_outputs: true

  save_intermediate_files: true

  resume_previous_execution: true

# =============================================================================
# PANDAS
# =============================================================================

pandas:

  nullable_dtypes: true

  copy_on_write: false

# =============================================================================
# EXPORTACIÓN
# =============================================================================

export:

  default_csv_encoding: "utf-8"

  default_csv_separator: ","

  parquet_compression: "snappy"

# =============================================================================
# DESARROLLO
# =============================================================================

development:

  debug: false

  verbose: false

  profiling: false

# =============================================================================
# FIN
# =============================================================================