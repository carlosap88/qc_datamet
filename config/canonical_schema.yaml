# =============================================================================
# QC_DataMet v0.1.0
# canonical_schema.yaml
#
# Esquema Canónico Oficial
#
# Este archivo define la estructura final del dataset generado por
# QC_DataMet después de completar todo el pipeline de procesamiento.
#
# Responsabilidades
# -----------------
# • Definir el orden oficial de las columnas.
# • Definir nombres internos estandarizados.
# • Definir tipos de datos.
# • Definir nulabilidad.
# • Definir claves.
# • Definir grupos de variables.
# • Definir exportaciones.
#
# No contiene:
#
# • aliases
# • nombres originales del Excel
# • reglas QC
# • límites físicos
#
# Estos elementos pertenecen a:
#
# excel_schema.yaml
# data_dictionary.yaml
# qc_rules.yaml
#
# =============================================================================

canonical_schema:

  name: "qc_datamet_canonical_schema"

  version: "0.1.0"

  project: "QC_DataMet"

  description: >
    Esquema canónico oficial del dataset final utilizado por
    QC_DataMet.

  references:

    input_schema: "excel_schema.yaml"

    data_dictionary: "data_dictionary.yaml"

    qc_rules: "qc_rules.yaml"

    stations: "stations.yaml"



# =============================================================================
# CONVENCIONES
# =============================================================================

conventions:

  column_names: "snake_case"

  encoding: "UTF-8"

  timezone: "UTC"

  indentation: 2

  missing_values: "null"

  datetime_format: "%Y-%m-%dT%H:%M:%SZ"

  dataframe_engine: "pandas"



# =============================================================================
# VALIDACIÓN
# =============================================================================

validation:

  allow_extra_columns: false

  allow_missing_columns: false

  enforce_column_order: true

  enforce_column_types: true

  enforce_primary_key: true

  trim_text: true

  normalize_empty_strings: true

  remove_duplicate_records: false



# =============================================================================
# CLAVES
# =============================================================================

keys:

  primary_key:

    - record_id

  natural_key:

    - station_id

    - datetime_utc

  duplicate_detection:

    - station_id

    - datetime_utc



# =============================================================================
# GRUPOS DE COLUMNAS
# =============================================================================

column_groups:

  - technical

  - identification

  - datetime

  - report

  - wind

  - temperature

  - pressure

  - humidity

  - precipitation

  - visibility

  - weather

  - cloud_layer_1

  - cloud_layer_2

  - cloud_layer_3

  - station_metadata

  - provenance

  - quality_control



# =============================================================================
# EXPORTACIONES
# =============================================================================

exports:

  csv:

    enabled: true

    delimiter: ","

    encoding: "UTF-8"

    include_header: true

    datetime_format: "%Y-%m-%dT%H:%M:%SZ"

  parquet:

    enabled: true

    compression: "snappy"

    preserve_nullable_types: true

  database:

    enabled: true

    table: "meteorological_observations"

    schema: "public"

    batch_size: 5000



# =============================================================================
# COLUMNAS DEL DATASET FINAL
# =============================================================================

columns:

  # ===========================================================================
  # IDENTIFICACIÓN TÉCNICA
  # ===========================================================================

  - position: 1

    name: "record_id"

    dtype: "string"

    nullable: false

    group: "technical"

    description: >
      Identificador único generado por el pipeline para cada registro.

    export:

      csv: true

      parquet: true

      database: true


  - position: 2

    name: "station_id"

    dtype: "string"

    nullable: false

    group: "identification"

    description: >
      Identificador oficial OACI o institucional de la estación.

    export:

