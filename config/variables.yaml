# =============================================================================
# QC_DataMet v0.1.0
# variables.yaml
#
# Catálogo maestro de variables meteorológicas.
#
# Alcance:
#   - METAR
#   - SPECI
#   - TAF
#   - TREND
#   - variables operacionales históricas del archivo Excel
#
# IMPORTANTE:
#   - Las variables actuales tienen enabled: true e implemented: true.
#   - Las variables futuras permanecen preparadas con enabled: false.
#   - Tipos y descripciones extensas pertenecen a data_dictionary.yaml.
#   - Las definiciones completas de unidades pertenecerán a units.yaml.
# =============================================================================

catalog:
  name: qc_datamet_variables_catalog
  version: 0.1.0
  description: Catálogo maestro de variables para METAR, SPECI, TAF y variables operacionales históricas utilizadas
    por QC_DataMet.
  scope:
    aviation_products:
    - METAR
    - SPECI
    - TAF
    - TREND
    historical_operational_variables:
    - wet_bulb_temperature
    - relative_humidity
    - maximum_daily_temperature
    - minimum_daily_temperature
    - hourly_precipitation
    - qfe
    excluded_products:
    - SIGMET
    - AIRMET
    - GAMET
    - SWX
    - VAA
    - TCA
  references:
    data_dictionary: data_dictionary.yaml
    canonical_schema: canonical_schema.yaml
    units: units.yaml
    qc_rules: qc_rules.yaml
    descriptors_directory: descriptors/
  conventions:
    variable_keys: snake_case
    enabled_meaning: La variable participa en el pipeline actual.
    implemented_meaning: Existe soporte de lectura, normalización o QC.
    operational_meaning: La variable pertenece al alcance operacional definido.
variable_groups:
- identification
- report_metadata
- datetime
- surface_wind
- temperature
- humidity
- precipitation
- pressure
- visibility
- runway_visual_range
- weather
- clouds
- cloud_layer_1
- cloud_layer_2
- cloud_layer_3
- supplementary_information
- runway_state
- taf_validity
- taf_forecast
- taf_temperature
- taf_change_groups
