# =============================================================================
# QC_DATAMET v1.0
# excel_schema.yaml
#
# Esquema físico de los archivos Excel de entrada.
#
# Este archivo describe exclusivamente:
#   - la cantidad esperada de columnas;
#   - los encabezados originales;
#   - el orden de entrada;
#   - los tipos de datos iniciales esperados;
#   - las columnas obligatorias;
#   - la posibilidad de valores nulos;
#   - los aliases de encabezados aceptados.
#
# No define:
#   - los nombres internos del DataFrame;
#   - el orden final de las columnas;
#   - las unidades normalizadas;
#   - las reglas de control de calidad;
#   - las columnas técnicas o de trazabilidad.
#
# La validación se ejecutará después de eliminar:
#   - filas completamente vacías;
#   - columnas completamente vacías.
# =============================================================================

schema:
  name: "qc_datamet_excel_input"
  version: "1.0.0"

  description: >
    Esquema oficial de entrada para archivos Excel de observaciones
    meteorológicas aeronáuticas.

  sheet_mode: "all"
  header_row: 0
  expected_columns: 52

  allow_extra_columns: false
  allow_missing_columns: false
  allow_reordered_columns: false
  allow_duplicate_headers: false

  case_sensitive_headers: false
  use_header_aliases: true

